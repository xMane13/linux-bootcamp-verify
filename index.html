<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación · Linux Bootcamp 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #060a08;
    --panel: #0c1410;
    --line: #163425;
    --green: #35d488;
    --green-dim: #1c7a52;
    --green-glow: rgba(53, 212, 136, 0.35);
    --text: #d6f5e6;
    --text-dim: #6f9482;
    --red: #ff5f5f;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; min-height:100vh; width:100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    display:flex; align-items:center; justify-content:center;
    padding: 24px;
  }
  .window{
    width: 100%;
    max-width: 720px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(53,212,136,0.05), 0 30px 80px -30px rgba(0,0,0,0.8), 0 0 60px -20px var(--green-glow);
    overflow: hidden;
  }
  .titlebar{
    display:flex; align-items:center; gap:8px;
    padding: 12px 16px;
    background: linear-gradient(to bottom, #0f1a15, #0a120e);
    border-bottom: 1px solid var(--line);
  }
  .dot{ width:11px; height:11px; border-radius:50%; }
  .dot.r{ background:#ff5f56; }
  .dot.y{ background:#ffbd2e; }
  .dot.g{ background:#27c93f; }
  .titlebar .path{
    margin-left: 10px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .term{
    padding: 28px 26px 34px;
    font-size: 14px;
    line-height: 1.7;
    min-height: 340px;
  }
  .prompt{ color: var(--green-dim); }
  .cmd{ color: var(--text); }
  .caret{
    display:inline-block; width:8px; height:16px;
    background: var(--green);
    margin-left: 2px;
    vertical-align: -3px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }
  .out{ margin-top: 18px; opacity:0; transform: translateY(4px); animation: rise 0.5s ease forwards; }
  @keyframes rise{ to{ opacity:1; transform:none; } }
  .rule{ color: var(--green-dim); user-select:none; }
  .stamp{
    display:inline-flex; align-items:center; gap:8px;
    border: 1px solid var(--green-dim);
    color: var(--green);
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.08em;
    font-size: 12px;
    background: rgba(53,212,136,0.06);
  }
  .stamp::before{ content:"●"; font-size: 9px; }
  .stamp.bad{ border-color:#7a2a2a; color: var(--red); background: rgba(255,95,95,0.06); }
  .stamp.bad::before{ content:"×"; }
  .field{ display:grid; grid-template-columns: 130px 1fr; gap: 10px; margin: 3px 0; }
  .k{ color: var(--text-dim); }
  .v{ color: var(--text); font-weight:500; }
  .sigs{ margin-top: 16px; }
  .sig{ display:flex; justify-content:space-between; padding: 6px 0; border-bottom: 1px dashed var(--line); font-size:13px; }
  .sig:last-child{ border-bottom:none; }
  .sig .role{ color: var(--text-dim); }
  .footer-line{ margin-top: 22px; color: var(--text-dim); font-size: 12px; }
  a{ color: var(--green); }
  .idline{ word-break: break-all; color: var(--text-dim); font-size: 12px; }
  .blank{ height: 6px; }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="path">verify@ieee-yachaytech: ~/linux-bootcamp</span>
    </div>
    <div class="term" id="term">
      <div><span class="prompt">$</span> <span class="cmd">verify --credential<span id="idPreview"></span></span><span class="caret"></span></div>
      <div class="out" id="output"></div>
    </div>
  </div>

<script>
async function run(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  document.getElementById('idPreview').textContent = id ? ('=' + id) : '';

  const outEl = document.getElementById('output');

  if(!id){
    outEl.innerHTML = `
      <div class="rule">--------------------------------------------</div>
      <div style="margin-top:10px">Uso: agrega <span class="v">?id=&lt;credential-id&gt;</span> a esta URL.</div>
      <div class="footer-line">Este QR debe apuntar a una URL con el parámetro <code>id</code>.</div>
    `;
    return;
  }

  let data;
  try{
    const res = await fetch('credentials.json', { cache: 'no-store' });
    data = await res.json();
  }catch(e){
    outEl.innerHTML = `<div class="stamp bad">ERROR</div><div class="footer-line">No se pudo cargar la base de credenciales.</div>`;
    return;
  }

  const cred = data.credentials.find(c => c.id.toLowerCase() === id.toLowerCase());

  if(!cred){
    outEl.innerHTML = `
      <div class="rule">--------------------------------------------</div>
      <div style="margin-top:10px"><span class="stamp bad">NO ENCONTRADO</span></div>
      <div class="footer-line">Ningún certificado coincide con este identificador.</div>
      <div class="idline">id: ${escapeHtml(id)}</div>
    `;
    return;
  }

  const sigsHtml = data.signatures.map(s => `
    <div class="sig"><span>${escapeHtml(s.name)}</span><span class="role">${escapeHtml(s.role)}</span></div>
  `).join('');

  outEl.innerHTML = `
    <div class="rule">--------------------------------------------</div>
    <div class="blank"></div>
    <div><span class="stamp">CERTIFICADO VÁLIDO</span></div>
    <div class="blank"></div>
    <div class="field"><span class="k">Curso</span><span class="v">${escapeHtml(data.course)}</span></div>
    <div class="field"><span class="k">Otorgado a</span><span class="v">${escapeHtml(cred.name)}</span></div>
    <div class="field"><span class="k">Fecha</span><span class="v">${escapeHtml(cred.issueDate)}</span></div>
    <div class="field"><span class="k">Organiza</span><span class="v">${data.organizers.map(escapeHtml).join(' · ')}</span></div>
    <div class="sigs">${sigsHtml}</div>
    <div class="footer-line">id: <span class="idline" style="display:inline">${escapeHtml(cred.id)}</span></div>
  `;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

run();
</script>
</body>
</html>
